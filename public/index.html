<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>J.A.R.V.I.S</title>
  <meta name="theme-color" content="#202c33">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="J.A.R.V.I.S">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="stylesheet" href="style.css?v=22">
</head>
<body>
  <div id="app">
    <!-- Panel lista -->
    <div id="panel-list">
      <header id="list-header">
        <h1>J.A.R.V.I.S</h1>
        <select id="account-select" title="Cuenta activa" aria-label="Cuenta activa"></select>
        <a id="account-switch" title="Ir a la otra cuenta" hidden></a>
        <button id="search-btn" title="Buscar (Ctrl+K)" aria-label="Buscar">
          <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19zM9.5 14C7 14 5 12 5 9.5S7 5 9.5 5 14 7 14 9.5 12 14 9.5 14z"/></svg>
        </button>
        <button id="refresh-btn" title="Actualizar" aria-label="Actualizar">
          <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
        </button>
        <button id="settings-btn" title="Configuración" aria-label="Configuración">
          <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
        </button>
        <button id="new-conv" title="Nueva conversación" aria-label="Nueva conversación">
          <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"/></svg>
        </button>
      </header>
      <div id="ptr-indicator" hidden>
        <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
        Actualizando…
      </div>
      <nav id="tree"></nav>
    </div>

    <!-- Panel chat -->
    <div id="panel-chat">
      <header id="chat-header">
        <button id="back-btn" aria-label="Volver" title="Volver">
          <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        </button>
        <div id="conv-info">
          <span id="conv-title">Elegí una conversación</span>
          <span id="conv-status"></span>
        </div>
        <span id="cost-badge" title="Costo estimado" hidden></span>
        <button id="menu-btn" title="Opciones" aria-label="Opciones" hidden>
          <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
        </button>
      </header>
      <div id="chat-menu" hidden>
        <label class="menu-row">
          <span>Modelo</span>
          <select id="model-select">
            <option value="">auto</option>
            <option value="opus">Opus</option>
            <option value="sonnet">Sonnet</option>
            <option value="haiku">Haiku</option>
          </select>
        </label>
        <button type="button" id="menu-retry" data-action="retry" disabled>
          <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
          Reintentar último mensaje
        </button>
        <button type="button" id="menu-export" data-action="export">
          <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          Exportar a Markdown
        </button>
      </div>
      <section id="messages">
        <div id="empty-state">
          <svg viewBox="0 0 24 24" fill="currentColor" width="48" height="48" opacity=".2"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
          <p>Seleccioná una conversación</p>
        </div>
      </section>
      <div id="composer-attachments"></div>
      <form id="composer">
        <input id="file-input" type="file" hidden accept="*/*" multiple>
        <button id="attach-btn" type="button" title="Adjuntar archivo" aria-label="Adjuntar archivo" disabled>
          <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5a2.5 2.5 0 0 1 5 0v10.5c0 .83-.67 1.5-1.5 1.5s-1.5-.67-1.5-1.5V6H9v9.5a2.5 2.5 0 0 0 5 0V5c0-2.21-1.79-4-4-4S6 2.79 6 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
        </button>
        <button id="mic-btn" type="button" title="Grabar audio" aria-label="Grabar audio" disabled>
          <svg id="mic-icon" viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </button>
        <textarea id="input" rows="1" placeholder="Mensaje…" disabled></textarea>
        <button id="cancel-btn" type="button" hidden title="Cancelar" aria-label="Cancelar">
          <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
        <button id="send" type="submit" disabled aria-label="Enviar">
          <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </form>
    </div>
  </div>

  <!-- Modal de búsqueda -->
  <dialog id="search-dialog">
    <form id="search-form" method="dialog">
      <input id="search-input" type="search" placeholder="Buscar en todas las conversaciones… (Ctrl+K)" autocomplete="off">
      <div id="search-results"></div>
      <div id="search-hint">Enter para abrir el primer resultado · Esc para cerrar</div>
    </form>
  </dialog>

  <!-- Modal nueva conversación -->
  <dialog id="new-dialog">
    <form method="dialog" id="new-form">
      <h2>Nueva conversación</h2>
      <label>Proyecto
        <select id="project-select"></select>
      </label>
      <label>Otra carpeta
        <input id="project-custom" type="text" placeholder="/home/loctime/Proyectos/…">
      </label>
      <label>Modelo
        <select id="new-model">
          <option value="">Default</option>
          <option value="opus">Opus</option>
          <option value="sonnet">Sonnet</option>
          <option value="haiku">Haiku</option>
        </select>
      </label>
      <label>Primer mensaje
        <textarea id="first-message" rows="3" required></textarea>
      </label>
      <menu>
        <button value="cancel">Cancelar</button>
        <button id="create-conv" value="default">Crear</button>
      </menu>
    </form>
  </dialog>

  <!-- Modal configuración -->
  <dialog id="settings-dialog">
    <form method="dialog" id="settings-form">
      <h2>Configuración</h2>

      <label class="settings-toggle">
        <input type="checkbox" id="cfg-show-tools">
        <span>Mostrar procesos del agente (Read, Bash, Edit…)</span>
      </label>

      <label>Voz del agente
        <select id="cfg-voice-assistant"><option value="">Default del sistema</option></select>
      </label>

      <label>Voz propia
        <select id="cfg-voice-user"><option value="">Default del sistema</option></select>
      </label>

      <div class="settings-colors">
        <label>Acento
          <input type="color" id="cfg-color-accent">
        </label>
        <label>Burbuja tuya
          <input type="color" id="cfg-color-me">
        </label>
        <label>Burbuja del agente
          <input type="color" id="cfg-color-ai">
        </label>
      </div>

      <menu>
        <button type="button" id="cfg-reset">Restaurar</button>
        <button value="cancel">Cerrar</button>
      </menu>
    </form>
  </dialog>

  <!-- Banner instalar PWA -->
  <div id="install-bar" hidden>
    <span id="install-text">Instalá J.A.R.V.I.S como app</span>
    <button id="install-btn">Instalar</button>
    <button id="install-dismiss" aria-label="Cerrar">✕</button>
  </div>

  <!-- Tooltip iOS -->
  <div id="ios-tip" hidden>
    <span>Tocá <strong>Compartir</strong> → <strong>Agregar a inicio</strong> para instalar</span>
    <button id="ios-tip-close" aria-label="Cerrar">✕</button>
  </div>

  <script src="app.js?v=21"></script>
</body>
</html>
